# =============================================================================
# AsBuiltReport Manager — GRUB2 EFI Boot Configuration
# Embedded into bootx64.efi via grub-mkstandalone in post-image.sh.
# =============================================================================

set default=0
set timeout=5

insmod part_gpt
insmod ext2
insmod serial

# Serial console: COM1 = ttyS0, 115200 8N1
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1

# Use plain VGA text console — do NOT use gfxterm/gfxmode.
# gfxterm causes VMware's virtual GPU to blank the screen after kernel handoff.
# terminal_output console keeps GRUB and the kernel boot log visible on the
# VGA/VMRC console without needing a serial connection.
terminal_output console
terminal_output --append serial
terminal_input  console
terminal_input  --append serial

menuentry "AsBuiltReport Manager" {
    insmod part_gpt
    insmod ext2

    # gpt2 = second GPT partition = rootfs (EFI is gpt1)
    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=tty0 \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=4 \
        panic=10 \
        vga=normal \
        nomodeset

    boot
}

menuentry "AsBuiltReport Manager (serial only)" {
    insmod part_gpt
    insmod ext2

    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=4 \
        panic=10 \
        nomodeset

    boot
}
