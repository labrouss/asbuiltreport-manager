# =============================================================================
# AsBuiltReport Manager — GRUB2 EFI Boot Configuration
# NOTE: This file is embedded in bootx64.efi at build time.
#       To modify boot settings after deployment, edit:
#         /boot/efi/EFI/BOOT/grub.cfg   (mounted EFI partition)
#       This embedded config immediately loads that external file if present.
# =============================================================================

set default=0
set timeout=5

insmod part_gpt
insmod ext2
insmod fat
insmod serial

# Serial console
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_output console
terminal_output --append serial
terminal_input  console
terminal_input  --append serial

# ── Chain-load external grub.cfg from the EFI partition ──────────────────────
# This allows post-deployment editing of boot parameters without rebuilding
# the OVA. Mount the EFI partition and edit /boot/efi/EFI/BOOT/grub.cfg.
insmod search_fs_uuid
if search --no-floppy --set=efi_part --file /EFI/BOOT/grub.cfg; then
    if [ -f ($efi_part)/EFI/BOOT/grub.cfg ]; then
        source ($efi_part)/EFI/BOOT/grub.cfg
        # If source returned (file not found or syntax error), fall through
    fi
fi

# ── Default boot entries (used if external grub.cfg is absent/invalid) ───────

menuentry "AsBuiltReport Manager" {
    insmod part_gpt
    insmod ext2
    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=tty0 \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=4 \
        panic=10 \
        nomodeset \
        video=efifb:off \
        vga=normal

    boot
}

menuentry "AsBuiltReport Manager (serial only)" {
    insmod part_gpt
    insmod ext2
    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=4 \
        panic=10 \
        nomodeset

    boot
}
