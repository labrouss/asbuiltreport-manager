# =============================================================================
# AsBuiltReport Manager — GRUB2 EFI Boot Configuration
# Embedded into bootx64.efi via grub-mkstandalone in post-image.sh.
# =============================================================================

set default=0
set timeout=5

insmod part_gpt
insmod ext2
insmod all_video
insmod font
insmod gfxterm
insmod serial

# Serial console: COM1 = ttyS0, 115200 8N1
serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1

if loadfont unicode; then
    set gfxmode=auto
    terminal_output gfxterm
    terminal_output --append serial
    terminal_input  serial
    terminal_input  --append console
else
    terminal_output console
    terminal_output --append serial
    terminal_input  console
    terminal_input  --append serial
fi

menuentry "AsBuiltReport Manager" {
    insmod part_gpt
    insmod ext2

    # gpt2 = second GPT partition = rootfs (EFI is gpt1)
    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=tty0 \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=7 \
        panic=10

    boot
}

menuentry "AsBuiltReport Manager (serial only)" {
    insmod part_gpt
    insmod ext2

    set root=(hd0,gpt2)

    linux /boot/bzImage \
        root=/dev/sda2 \
        rootwait \
        rootfstype=ext4 \
        ro \
        console=ttyS0,115200n8 \
        earlyprintk=serial,ttyS0,115200 \
        loglevel=7 \
        panic=10 \
        nomodeset \
        3

    boot
}
