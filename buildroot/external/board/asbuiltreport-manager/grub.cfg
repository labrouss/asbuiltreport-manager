set default=0
set timeout=3

# Kernel and rootfs are on the partition labelled "rootfs"
# bzImage is installed to /boot/bzImage by Buildroot
menuentry "AsBuiltReport Manager" {
    search --no-floppy --label --set=root rootfs
    linux   /boot/bzImage root=LABEL=rootfs rw console=tty1 console=ttyS0,115200 quiet
}

menuentry "AsBuiltReport Manager (recovery)" {
    search --no-floppy --label --set=root rootfs
    linux   /boot/bzImage root=LABEL=rootfs rw console=tty1 console=ttyS0,115200 single
}
