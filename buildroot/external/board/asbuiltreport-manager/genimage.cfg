# =============================================================================
# genimage.cfg — Disk image layout for AsBuiltReport Manager OVA
#
# Layout (40 GB GPT disk):
#   p1:  1 MB    BIOS boot partition (grub bios_grub)
#   p2:  512 MB  EFI System Partition (FAT32, grub EFI)
#   p3:  ~39 GB  Linux root ext4
# =============================================================================

image boot.vfat {
    vfat {
        files = {
            "EFI/BOOT/BOOTX64.EFI",
            "EFI/BOOT/grub.cfg"
        }
    }
    size = 512M
}

image rootfs.img {
    ext4 {
        label   = "rootfs"
        use-faked-root = true
    }
    size = 39G
}

image asbuiltreport-manager.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition bios_boot {
        in-partition-table = true
        partition-type-uuid = "21686148-6449-6E6F-744E-656564454649"
        offset = 1M
        size   = 1M
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = true
        image  = "boot.vfat"
        offset = 2M
        size   = 512M
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image  = "rootfs.img"
        offset = 514M
    }
}
