# =============================================================================
# genimage.cfg — AsBuiltReport Manager OVA disk layout
#
# Matches san-manager pattern exactly.
# The EFI binary (bootx64.efi) is built by post-image.sh using
# grub-mkstandalone and placed at BINARIES_DIR/efi-part/EFI/BOOT/.
# bzImage is injected into rootfs.ext4 at /boot/bzImage by post-image.sh.
#
# Layout (40 GB GPT):
#   p1:  512 MB   EFI System Partition  (FAT32, efi-part.vfat)
#   p2:  ~39 GB   Linux root ext4       (rootfs.ext4 = symlink to rootfs.ext2)
# =============================================================================

image efi-part.vfat {
    vfat {
        label = "EFI"
        files = {
            "efi-part/EFI"
        }
    }
    size = 512M
}

image asbuiltreport-manager.img {
    hdimage {
        partition-table-type = "gpt"
        # Total: 512MB EFI + 6GB rootfs + alignment = ~6.5GB on disk
        # vCenter provisions this as a thin VMDK; VM expands it to 40GB via resize2fs at first boot
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = true
        image = "efi-part.vfat"
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
    }
}
