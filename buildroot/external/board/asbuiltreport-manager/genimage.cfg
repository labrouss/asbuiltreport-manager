# =============================================================================
# genimage.cfg — AsBuiltReport Manager OVA disk layout
#
# Buildroot pre-builds the rootfs as output/images/rootfs.ext2
# (symlinked as rootfs.ext4). We reference it directly — genimage
# treats any file in inputpath that has no image{} block as a
# pre-built binary and embeds it verbatim. This avoids needing
# genext2fs on the host.
#
# Buildroot GRUB2 EFI output (relative to inputpath = output/images/):
#   efi-part/EFI/BOOT/bootx64.efi
#   efi-part/EFI/BOOT/grub.cfg   (overwritten by post-image.sh)
#
# Disk layout (40 GB GPT):
#   p1:  1 MB     gap (EFI alignment)
#   p2:  512 MB   EFI System Partition  (FAT32, boot.vfat)
#   p3:  ~39.5 GB Linux root ext4       (pre-built rootfs.ext2)
# =============================================================================

image boot.vfat {
    vfat {
        files = {
            "efi-part/EFI/BOOT/bootx64.efi",
            "efi-part/EFI/BOOT/grub.cfg"
        }
    }
    size = 512M
}

image asbuiltreport-manager.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = true
        image = "boot.vfat"
        offset = 1M
        size = 512M
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext2"
        offset = 513M
    }
}
