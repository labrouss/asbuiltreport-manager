# =============================================================================
# genimage.cfg — AsBuiltReport Manager OVA disk layout
#
# Buildroot places GRUB2 EFI output at:
#   output/images/efi-part/EFI/BOOT/bootx64.efi
#   output/images/efi-part/EFI/BOOT/grub.cfg
#
# genimage's inputpath is output/images/, so paths inside image blocks
# are relative to that directory.
#
# Layout (40 GB GPT):
#   p1: 512 MB  EFI System Partition (FAT32)
#   p2: ~39 GB  Linux root ext4 (label=rootfs)
# =============================================================================

image boot.vfat {
    vfat {
        files = {
            "efi-part/EFI/BOOT/bootx64.efi",
            "efi-part/EFI/BOOT/grub.cfg"
        }
    }
    size = 512M
}

image rootfs.ext4 {
    ext4 {
        label = "rootfs"
    }
    size = 39G
}

image asbuiltreport-manager.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition efi {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = true
        image = "boot.vfat"
        offset = 1M
        size = 512M
    }

    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        image = "rootfs.ext4"
        offset = 513M
    }
}
